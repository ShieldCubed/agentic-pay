<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Agentic Pay</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b0f19" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b0f19; color: #e7ebf3; padding: 20px; padding-bottom: 60px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #8a93a8; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 12px; color: #8a93a8; margin: 14px 0 4px; }
  input, select {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3145;
    background: #131826; color: #e7ebf3; font-size: 15px;
  }
  button {
    width: 100%; margin-top: 20px; padding: 12px; border-radius: 10px; border: none;
    background: #4f7cff; color: white; font-size: 15px; font-weight: 600;
  }
  button.secondary { background: #1c2338; color: #e7ebf3; margin-top: 8px; }
  .card {
    background: #131826; border: 1px solid #2a3145; border-radius: 12px; padding: 16px;
    margin-bottom: 16px;
  }
  pre {
    background: #0e1220; border-radius: 8px; padding: 12px; font-size: 12px; overflow-x: auto;
    white-space: pre-wrap; word-break: break-all;
  }
</style>
</head>
<body>
  <h1>Agentic Pay</h1>
  <div class="sub">Connects to your local agentic-pay REST API</div>

  <div class="card">
    <label>API base URL</label>
    <input id="apiBase" placeholder="http://192.168.1.x:8787" />
    <label>API key</label>
    <input id="apiKey" placeholder="sk-agent-..." />
  </div>

  <div class="card">
    <label>Asset</label>
    <select id="asset">
      <option>BTC</option><option>ETH</option><option>USDT</option>
      <option>USDC</option><option>XRP</option><option>XMR</option><option>ZEC</option>
    </select>
    <button class="secondary" onclick="getAddress()">Show receiving address</button>
    <button class="secondary" onclick="getBalance()">Check balance</button>
  </div>

  <div class="card">
    <label>Send to address</label>
    <input id="toAddress" placeholder="destination address" />
    <label>Amount</label>
    <input id="amount" type="number" step="any" placeholder="0.00" />
    <label>Memo (optional)</label>
    <input id="memo" placeholder="memo / note" />
    <button onclick="sendPayment()">Send payment</button>
  </div>

  <pre id="output">Output will appear here.</pre>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
</body>
</html>
